<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="128" height="128">
  <!-- two small revealed-reading tiles -->
  <rect x="3" y="5" width="6.5" height="6.5" rx="1.4"
        fill="none" stroke="#ffffff" stroke-width="1.8" stroke-linejoin="round"/>
  <rect x="14.5" y="5" width="6.5" height="6.5" rx="1.4"
        fill="none" stroke="#ffffff" stroke-width="1.8" stroke-linejoin="round"/>
  <!-- thin link joining the two readings -->
  <path d="M9.5 8.25 L14.5 8.25"
        fill="none" stroke="#ffffff" stroke-width="1.4" stroke-linecap="round"/>
  <!-- converging caret pointing down between them: these readings point here -->
  <path d="M9 15 L12 19 L15 15"
        fill="none" stroke="#ffffff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
