<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="288" height="288">
  <!-- outer hexagon (pointy-top, vertical L/R edges) — cyan shell -->
  <polygon points="50,5 85,27.5 85,72.5 50,95 15,72.5 15,27.5"
           fill="none" stroke="#22e0ff" stroke-width="3" stroke-linejoin="round"/>
  <!-- inner concentric hexagon — magenta, for depth -->
  <polygon points="50,12 72,38 72,62 50,88 28,62 28,38"
           fill="none" stroke="#ff3aa0" stroke-width="2" opacity="0.7" stroke-linejoin="round"/>
  <!-- live node-core: void disc + magenta ring -->
  <circle cx="50" cy="50" r="8" fill="#070a14" stroke="#ff3aa0" stroke-width="2.5"/>
  <!-- live core dot — cyan -->
  <circle cx="50" cy="50" r="3" fill="#22e0ff"/>
  <!-- green uplink sweep arc, upper-right -->
  <path d="M 78,28 A 36 36 0 0 1 85,50"
        fill="none" stroke="#2bffa6" stroke-width="3" stroke-linecap="round"/>
</svg>
