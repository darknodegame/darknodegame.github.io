<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="128" height="128">
  <!-- Ruler baseline + 5 ticks. -->
  <line x1="2"  y1="16" x2="22" y2="16" stroke="#f0f4ff" stroke-width="1.4"/>
  <line x1="2"  y1="16" x2="2"  y2="13" stroke="#f0f4ff" stroke-width="1.4"/>
  <line x1="7"  y1="16" x2="7"  y2="13" stroke="#f0f4ff" stroke-width="1.4"/>
  <line x1="12" y1="16" x2="12" y2="13" stroke="#f0f4ff" stroke-width="1.4"/>
  <line x1="17" y1="16" x2="17" y2="13" stroke="#f0f4ff" stroke-width="1.4"/>
  <line x1="22" y1="16" x2="22" y2="13" stroke="#f0f4ff" stroke-width="1.4"/>
  <!-- Three EQUAL short spans, evenly spread, last flush to ruler end (x=22),
       wide deliberate gaps, NO caliper jaws = "several groups across the line". -->
  <rect x="2"  y="6" width="4" height="4" rx="0.8" fill="#ff2d92"/>
  <rect x="10" y="6" width="4" height="4" rx="0.8" fill="#ff2d92"/>
  <rect x="18" y="6" width="4" height="4" rx="0.8" fill="#ff2d92"/>
</svg>
